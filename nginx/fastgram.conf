# Redirecionar HTTP → HTTPS
server {
    listen 80;
    server_name fastgram.com.br www.fastgram.com.br;

    # Certbot challenge (necessário para renovação)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirecionar tudo para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Servidor principal
server {
    listen 443 ssl http2;
    server_name fastgram.com.br www.fastgram.com.br;

    # Certificados SSL (gerados pelo Certbot)
    ssl_certificate /etc/letsencrypt/live/fastgram.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fastgram.com.br/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/fastgram.com.br/chain.pem;

    # Configurações SSL modernas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — Forçar HTTPS por 1 ano
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Headers de segurança
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend — SPA React (Vite build)
    root /var/www/fastgram-site;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API → Backend Fastify (porta 3333)
    location /api/ {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout para webhooks do Stripe
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
