name: Deploy FastGram

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            
            cd /var/www/fastgram
            git pull origin main
            
            # Backend
            cd backend
            npm ci --omit=dev
            npx prisma generate
            npx prisma db push --accept-data-loss
            npm run build
            pm2 restart fastgram-api || pm2 start ecosystem.config.cjs
            
            # Frontend (build estático — Nginx serve)
            cd ../frontend
            npm ci
            npm run build
            
            # Copiar build para Nginx
            rm -rf /var/www/fastgram-site/*
            cp -r dist/* /var/www/fastgram-site/
            
            echo "✅ Deploy FastGram completo!"
